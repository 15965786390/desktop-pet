<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 128">
  <!-- White cartoon dog sprites - 5 frames: stand, walk1, walk2, sit, sleep -->

  <!-- Frame 1: Standing -->
  <g transform="translate(0,0)">
    <!-- Body -->
    <ellipse cx="64" cy="75" rx="35" ry="22" fill="#F5F0E8" stroke="#333" stroke-width="2"/>
    <!-- Head -->
    <circle cx="95" cy="50" r="20" fill="#F5F0E8" stroke="#333" stroke-width="2"/>
    <!-- Ear left -->
    <path d="M82 35 L78 15 L90 30" fill="#F5F0E8" stroke="#333" stroke-width="2"/>
    <!-- Ear right -->
    <path d="M100 32 L105 12 L110 28" fill="#F5F0E8" stroke="#333" stroke-width="2"/>
    <!-- Eye -->
    <circle cx="100" cy="48" r="3" fill="#333"/>
    <!-- Nose -->
    <ellipse cx="112" cy="52" rx="4" ry="3" fill="#333"/>
    <!-- Mouth -->
    <path d="M112 55 Q108 62 104 58" fill="none" stroke="#333" stroke-width="1.5"/>
    <!-- Tongue -->
    <path d="M108 58 Q106 65 110 65 Q114 65 112 58" fill="#FF8B8B" stroke="#333" stroke-width="1"/>
    <!-- Front legs -->
    <line x1="50" y1="90" x2="50" y2="115" stroke="#333" stroke-width="3" stroke-linecap="round"/>
    <line x1="62" y1="90" x2="62" y2="115" stroke="#333" stroke-width="3" stroke-linecap="round"/>
    <!-- Back legs -->
    <line x1="75" y1="90" x2="75" y2="115" stroke="#333" stroke-width="3" stroke-linecap="round"/>
    <line x1="85" y1="90" x2="85" y2="115" stroke="#333" stroke-width="3" stroke-linecap="round"/>
    <!-- Tail -->
    <path d="M30 68 Q20 45 28 40" fill="none" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Frame 2: Walk 1 (front legs forward) -->
  <g transform="translate(128,0)">
    <ellipse cx="64" cy="75" rx="35" ry="22" fill="#F5F0E8" stroke="#333" stroke-width="2"/>
    <circle cx="95" cy="48" r="20" fill="#F5F0E8" stroke="#333" stroke-width="2"/>
    <path d="M82 33 L78 13 L90 28" fill="#F5F0E8" stroke="#333" stroke-width="2"/>
    <path d="M100 30 L105 10 L110 26" fill="#F5F0E8" stroke="#333" stroke-width="2"/>
    <circle cx="100" cy="46" r="3" fill="#333"/>
    <ellipse cx="112" cy="50" rx="4" ry="3" fill="#333"/>
    <path d="M112 53 Q108 60 104 56" fill="none" stroke="#333" stroke-width="1.5"/>
    <path d="M108 56 Q106 63 110 63 Q114 63 112 56" fill="#FF8B8B" stroke="#333" stroke-width="1"/>
    <!-- Walking legs -->
    <line x1="48" y1="90" x2="40" y2="115" stroke="#333" stroke-width="3" stroke-linecap="round"/>
    <line x1="60" y1="90" x2="68" y2="115" stroke="#333" stroke-width="3" stroke-linecap="round"/>
    <line x1="73" y1="90" x2="80" y2="115" stroke="#333" stroke-width="3" stroke-linecap="round"/>
    <line x1="85" y1="90" x2="78" y2="115" stroke="#333" stroke-width="3" stroke-linecap="round"/>
    <path d="M30 68 Q18 50 25 42" fill="none" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Frame 3: Walk 2 (back legs forward) -->
  <g transform="translate(256,0)">
    <ellipse cx="64" cy="75" rx="35" ry="22" fill="#F5F0E8" stroke="#333" stroke-width="2"/>
    <circle cx="95" cy="48" r="20" fill="#F5F0E8" stroke="#333" stroke-width="2"/>
    <path d="M82 33 L78 13 L90 28" fill="#F5F0E8" stroke="#333" stroke-width="2"/>
    <path d="M100 30 L105 10 L110 26" fill="#F5F0E8" stroke="#333" stroke-width="2"/>
    <circle cx="100" cy="46" r="3" fill="#333"/>
    <ellipse cx="112" cy="50" rx="4" ry="3" fill="#333"/>
    <path d="M112 53 Q108 60 104 56" fill="none" stroke="#333" stroke-width="1.5"/>
    <path d="M108 56 Q106 63 110 63 Q114 63 112 56" fill="#FF8B8B" stroke="#333" stroke-width="1"/>
    <line x1="48" y1="90" x2="56" y2="115" stroke="#333" stroke-width="3" stroke-linecap="round"/>
    <line x1="60" y1="90" x2="52" y2="115" stroke="#333" stroke-width="3" stroke-linecap="round"/>
    <line x1="73" y1="90" x2="66" y2="115" stroke="#333" stroke-width="3" stroke-linecap="round"/>
    <line x1="85" y1="90" x2="92" y2="115" stroke="#333" stroke-width="3" stroke-linecap="round"/>
    <path d="M30 68 Q22 42 30 38" fill="none" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Frame 4: Sitting -->
  <g transform="translate(384,0)">
    <ellipse cx="64" cy="78" rx="32" ry="25" fill="#F5F0E8" stroke="#333" stroke-width="2"/>
    <circle cx="90" cy="48" r="20" fill="#F5F0E8" stroke="#333" stroke-width="2"/>
    <path d="M77 33 L73 13 L85 28" fill="#F5F0E8" stroke="#333" stroke-width="2"/>
    <path d="M95 30 L100 10 L105 26" fill="#F5F0E8" stroke="#333" stroke-width="2"/>
    <circle cx="95" cy="46" r="3" fill="#333"/>
    <ellipse cx="107" cy="50" rx="4" ry="3" fill="#333"/>
    <path d="M107 53 Q103 60 99 56" fill="none" stroke="#333" stroke-width="1.5"/>
    <!-- Front legs straight -->
    <line x1="55" y1="95" x2="55" y2="118" stroke="#333" stroke-width="3" stroke-linecap="round"/>
    <line x1="67" y1="95" x2="67" y2="118" stroke="#333" stroke-width="3" stroke-linecap="round"/>
    <!-- Back legs folded -->
    <path d="M42 90 Q35 105 45 112" fill="none" stroke="#333" stroke-width="3" stroke-linecap="round"/>
    <path d="M38 88 Q28 100 38 110" fill="none" stroke="#333" stroke-width="3" stroke-linecap="round"/>
    <path d="M35 72 Q22 55 28 45" fill="none" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Frame 5: Sleeping -->
  <g transform="translate(512,0)">
    <ellipse cx="64" cy="90" rx="40" ry="18" fill="#F5F0E8" stroke="#333" stroke-width="2"/>
    <circle cx="95" cy="82" r="18" fill="#F5F0E8" stroke="#333" stroke-width="2"/>
    <path d="M84 68 L82 52 L90 64" fill="#F5F0E8" stroke="#333" stroke-width="2"/>
    <path d="M98 66 L102 50 L106 62" fill="#F5F0E8" stroke="#333" stroke-width="2"/>
    <!-- Closed eyes -->
    <path d="M92 80 Q96 77 100 80" fill="none" stroke="#333" stroke-width="2"/>
    <ellipse cx="110" cy="84" rx="3" ry="2.5" fill="#333"/>
    <!-- Zzz -->
    <text x="108" y="65" font-size="12" fill="#6B9BD2" font-weight="bold">z</text>
    <text x="116" y="55" font-size="14" fill="#6B9BD2" font-weight="bold">z</text>
    <text x="124" y="45" font-size="16" fill="#6B9BD2" font-weight="bold">Z</text>
    <!-- Curled legs -->
    <path d="M45 100 Q42 108 48 108" fill="none" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M80 100 Q83 108 77 108" fill="none" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M28 85 Q20 78 25 72" fill="none" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  </g>
</svg>
